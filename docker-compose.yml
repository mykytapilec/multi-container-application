version: "3.9"

services:
  api:
    build: ./api
    container_name: todo-api
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: